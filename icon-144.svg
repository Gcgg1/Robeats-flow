<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1019"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0a0ff"/>
      <stop offset="50%" stop-color="#d07ef5"/>
      <stop offset="100%" stop-color="#9040c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="144" height="144" rx="25" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <polygon points="72,18 126,72 72,126 18,72"
    fill="none" stroke="#d07ef5" stroke-width="3" opacity="0.3"/>
  <!-- Gem diamond -->
  <polygon points="72,18 126,72 72,126 18,72"
    fill="url(#gem)" filter="url(#glow)" opacity="0.95"/>
  <!-- Inner highlight -->
  <polygon points="72,43 96,72 72,88 48,72"
    fill="rgba(255,255,255,0.18)"/>
  <!-- Text: RB -->
  <text x="72" y="82" 
    font-family="'Chakra Petch', 'Arial Black', sans-serif"
    font-weight="700" font-size="31"
    fill="white" text-anchor="middle"
    style="letter-spacing: -0px">RB</text>
  <!-- Subtext: FLOW -->
  <text x="72" y="105" 
    font-family="monospace"
    font-weight="400" font-size="18"
    fill="rgba(208,126,245,0.8)" text-anchor="middle"
    style="letter-spacing: 2px">FLOW</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1019"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0a0ff"/>
      <stop offset="50%" stop-color="#d07ef5"/>
      <stop offset="100%" stop-color="#9040c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="92" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <polygon points="256,62 450,256 256,450 62,256"
    fill="none" stroke="#d07ef5" stroke-width="12" opacity="0.3"/>
  <!-- Gem diamond -->
  <polygon points="256,62 450,256 256,450 62,256"
    fill="url(#gem)" filter="url(#glow)" opacity="0.95"/>
  <!-- Inner highlight -->
  <polygon points="256,150 343,256 256,314 169,256"
    fill="rgba(255,255,255,0.18)"/>
  <!-- Text: RB -->
  <text x="256" y="295" 
    font-family="'Chakra Petch', 'Arial Black', sans-serif"
    font-weight="700" font-size="112"
    fill="white" text-anchor="middle"
    style="letter-spacing: -2px">RB</text>
  <!-- Subtext: FLOW -->
  <text x="256" y="380" 
    font-family="monospace"
    font-weight="400" font-size="66"
    fill="rgba(208,126,245,0.8)" text-anchor="middle"
    style="letter-spacing: 7px">FLOW</text>
</svg>
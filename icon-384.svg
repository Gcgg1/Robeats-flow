<svg xmlns="http://www.w3.org/2000/svg" width="384" height="384" viewBox="0 0 384 384">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1019"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0a0ff"/>
      <stop offset="50%" stop-color="#d07ef5"/>
      <stop offset="100%" stop-color="#9040c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="384" height="384" rx="69" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <polygon points="192,47 337,192 192,337 47,192"
    fill="none" stroke="#d07ef5" stroke-width="9" opacity="0.3"/>
  <!-- Gem diamond -->
  <polygon points="192,47 337,192 192,337 47,192"
    fill="url(#gem)" filter="url(#glow)" opacity="0.95"/>
  <!-- Inner highlight -->
  <polygon points="192,113 257,192 192,235 127,192"
    fill="rgba(255,255,255,0.18)"/>
  <!-- Text: RB -->
  <text x="192" y="221" 
    font-family="'Chakra Petch', 'Arial Black', sans-serif"
    font-weight="700" font-size="84"
    fill="white" text-anchor="middle"
    style="letter-spacing: -1px">RB</text>
  <!-- Subtext: FLOW -->
  <text x="192" y="284" 
    font-family="monospace"
    font-weight="400" font-size="49"
    fill="rgba(208,126,245,0.8)" text-anchor="middle"
    style="letter-spacing: 5px">FLOW</text>
</svg>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ro-Beats Planner</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RB Planner">
<meta name="theme-color" content="#d07ef5">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="icon" type="image/svg+xml" href="icon-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03040a;--s1:#06080f;--s2:#080b14;--s3:#0c1019;
  --bd:#1a1f3a;--bd2:#252d50;--txt:#e8e0f5;--dim:#3a3560;
  --flow:#d07ef5;--chill:#4fc3f7;--vibe:#5ef59a;--beat:#ffc233;--rush:#f56262;
  --multi:#d07ef5;--dup:#c9a0f5;--ac:#d07ef5;
}
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
body{background:var(--bg);color:var(--txt);font-family:'Chakra Petch',sans-serif;min-height:100vh;overflow-x:hidden;
  padding-bottom:max(90px,calc(80px + env(safe-area-inset-bottom)))}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 35% at 20% 0%,rgba(208,126,245,.06),transparent 60%),
  radial-gradient(ellipse 50% 30% at 80% 100%,rgba(208,126,245,.04),transparent 60%);
  pointer-events:none;z-index:0}

/* ── Pages ── */
.page{display:none;position:relative;z-index:1}
.page.active{display:block}

/* ── Home screen ── */
.home{max-width:500px;margin:0 auto;padding:40px 20px 20px}
.home-header{text-align:center;margin-bottom:36px}
.home-eye{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:6px;color:var(--flow);opacity:.4;margin-bottom:12px;text-transform:uppercase}
.home-title{font-size:clamp(32px,9vw,60px);font-weight:700;letter-spacing:3px;color:#fff;line-height:1;text-transform:uppercase}
.home-title em{font-style:normal;color:var(--flow);text-shadow:0 0 40px rgba(208,126,245,.5)}
.home-sub{color:var(--dim);font-size:10px;margin-top:10px;font-family:'Fira Code',monospace;letter-spacing:1px}
.primary-grid{display:flex;flex-direction:column;gap:12px}
.primary-card{background:var(--s1);border:1.5px solid var(--bd);border-radius:14px;padding:18px 20px;
  display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.primary-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .18s}
.primary-card:hover,.primary-card:active{transform:translateX(4px)}
.primary-card:active::before{opacity:1}
.pc-gem{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;font-family:'Fira Code',monospace;flex-shrink:0}
.pc-info{flex:1;min-width:0}
.pc-name{font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;line-height:1;margin-bottom:4px}
.pc-sub{font-family:'Fira Code',monospace;font-size:9px;color:var(--dim);line-height:1.6}
.pc-progress{text-align:right;flex-shrink:0}
.pc-pct{font-family:'Fira Code',monospace;font-size:18px;font-weight:700;line-height:1}
.pc-plabel{font-family:'Fira Code',monospace;font-size:8px;color:var(--dim);margin-top:2px}
.pc-bar{height:3px;background:var(--s3);border-radius:2px;margin-top:6px;overflow:hidden;width:80px}
.pc-bar-fill{height:100%;border-radius:2px;transition:width .3s}

/* ── Planner wrapper ── */
.planner{max-width:1000px;margin:0 auto;padding:0 14px}

/* ── Back nav ── */
.topbar{display:flex;align-items:center;gap:12px;padding:16px 14px 0;position:relative;z-index:1;
  padding-top:max(16px,calc(12px + env(safe-area-inset-top)))}
.back-btn{display:flex;align-items:center;gap:7px;background:var(--s1);border:1px solid var(--bd);
  border-radius:8px;padding:8px 14px;font-family:'Fira Code',monospace;font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent}
.back-btn:hover{color:var(--txt);border-color:var(--bd2)}
.topbar-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;flex:1;
  text-align:center;color:var(--txt)}
.topbar-right{width:80px;text-align:right;font-family:'Fira Code',monospace;font-size:8px;color:var(--dim)}

/* ── Shared planner styles ── */
header{text-align:center;margin-bottom:28px;padding:20px 0 24px;border-bottom:1px solid var(--bd)}
.eyebrow{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:7px;color:var(--ac);opacity:.4;margin-bottom:12px;text-transform:uppercase}
h1{font-size:clamp(24px,6vw,48px);font-weight:700;letter-spacing:3px;color:#fff;line-height:1;text-transform:uppercase}
h1 em{font-style:normal;color:var(--ac);text-shadow:0 0 40px rgba(208,126,245,.4)}
.sub{color:var(--dim);font-size:10px;margin-top:8px;line-height:1.9;font-family:'Fira Code',monospace}
.sub strong{color:var(--ac)}
.strip{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:22px}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;text-align:center;min-width:85px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(208,126,245,.04),transparent 60%);pointer-events:none}
.sc-n{font-size:26px;font-weight:700;line-height:1}
.sc-l{font-size:8px;color:var(--dim);margin-top:4px;font-family:'Fira Code',monospace;letter-spacing:1px;text-transform:uppercase}
.master{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:22px}
.mtitle{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.mtitle::after{content:'';flex:1;height:1px;background:var(--bd)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:520px){.mgrid{grid-template-columns:1fr}}
.mrow{display:flex;align-items:center;gap:10px;padding:7px 11px;border-radius:7px;background:var(--s2);border:1px solid var(--bd)}
.mnum{font-family:'Fira Code',monospace;font-size:10px;font-weight:700;width:22px;text-align:center;flex-shrink:0}
.mname{font-size:10px;font-weight:600;flex:1;line-height:1.3}
.mbadge{font-size:7px;font-family:'Fira Code',monospace;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.keybox{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:11px 16px;margin-bottom:22px;display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.ki{display:flex;align-items:center;gap:6px;font-size:10px}
.kdot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.tabs{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:22px}
.tab{font-family:'Fira Code',monospace;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:8px 14px;border-radius:7px;border:1.5px solid var(--bd2);background:var(--s2);color:var(--dim);
  cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;min-height:38px}
.tab:hover{color:var(--txt);background:var(--s3)}
.tab.on[data-c=flow] {border-color:var(--flow);background:rgba(208,126,245,.08);color:var(--flow)}
.tab.on[data-c=chill]{border-color:var(--chill);background:rgba(79,195,247,.08);color:var(--chill)}
.tab.on[data-c=vibe] {border-color:var(--vibe);background:rgba(94,245,154,.08);color:var(--vibe)}
.tab.on[data-c=beat] {border-color:var(--beat);background:rgba(255,194,51,.08);color:var(--beat)}
.tab.on[data-c=rush] {border-color:var(--rush);background:rgba(245,98,98,.08);color:var(--rush)}
.tbox{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 15px;
  display:flex;flex-wrap:wrap;align-items:center;gap:10px;justify-content:space-between;margin-bottom:14px}
.tlabel{font-size:13px;font-weight:700;letter-spacing:2px;flex-shrink:0;text-transform:uppercase}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;border:1px solid var(--bd2);background:var(--s2);font-family:'Fira Code',monospace;font-size:9px}
.cdot{width:6px;height:6px;border-radius:2px}
.stag{font-family:'Fira Code',monospace;font-size:8px;padding:2px 7px;border-radius:4px;background:rgba(208,126,245,.04);border:1px solid rgba(208,126,245,.1);color:var(--dim)}
.rem-panel{border-radius:10px;border:1.5px solid var(--bd2);margin-bottom:18px;overflow:hidden}
.rem-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--bd)}
.rem-title{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.rem-progress{font-family:'Fira Code',monospace;font-size:10px;font-weight:700}
.rem-bar-wrap{padding:0 14px;background:var(--s2)}
.rem-bar-bg{height:4px;background:var(--s3);border-radius:3px;overflow:hidden;margin:9px 0 0}
.rem-bar-fill{height:100%;border-radius:3px}
.rem-sub-text{padding-bottom:9px;padding-top:4px;font-family:'Fira Code',monospace;font-size:9px;color:var(--dim)}
.rem-body{padding:12px 14px;background:var(--s1);display:flex;flex-wrap:wrap;gap:8px}
.rem-gem{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--bd2);border-radius:7px;padding:8px 11px;flex:1;min-width:110px}
.rem-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.rem-label{font-size:10px;color:var(--dim);flex:1}
.rem-count{font-family:'Fira Code',monospace;font-size:15px;font-weight:700;line-height:1}
.rem-gsub{font-family:'Fira Code',monospace;font-size:8px;color:var(--dim);margin-top:1px}
.rem-done{background:rgba(94,245,154,.06);border-color:rgba(94,245,154,.2)}
.rem-done .rem-label{color:#5ef59a}.rem-done .rem-count{color:#5ef59a}
.rep-warn{font-family:'Fira Code',monospace;font-size:9px;color:#f97316;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:5px;padding:5px 9px;margin-bottom:7px;line-height:1.7}
.rep-warn strong{color:#f97316}
.p-rep .pinner{opacity:1;border:2px solid #f97316}.p-rep .pcheck{font-size:8px;color:#f97316}
.bsub-rep{color:#f97316}
.shead{display:flex;align-items:center;gap:10px;margin-bottom:12px;margin-top:5px}
.stitle{font-family:'Fira Code',monospace;font-size:8px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;white-space:nowrap}
.sline{flex:1;height:1px;background:var(--bd)}
.badge{font-size:7px;font-family:'Fira Code',monospace;letter-spacing:.5px;padding:2px 7px;border-radius:3px;white-space:nowrap}
.b-multi{background:rgba(208,126,245,.07);border:1px solid rgba(208,126,245,.25);color:var(--flow)}
.b-solo{background:rgba(10,8,26,.1);border:1px solid rgba(26,20,58,.5);color:#6a5a90}
.b-dup{background:rgba(201,160,245,.07);border:1px solid rgba(201,160,245,.35);color:var(--dup)}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:520px){.ggrid{grid-template-columns:1fr}}
.card{background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s;animation:slideUp .3s ease both}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.7)}
.card.t-multi{border-color:rgba(208,126,245,.18)}.card.t-solo{border-color:rgba(26,20,58,.5)}.card.t-dup{border-color:rgba(201,160,245,.35);background:rgba(201,160,245,.015)}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ctop{padding:9px 13px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.cname{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:4px}
.cslot{font-family:'Fira Code',monospace;font-size:9px;font-weight:700;white-space:nowrap;padding:3px 6px;border-radius:4px;background:rgba(208,126,245,.06);border:1px solid rgba(208,126,245,.18);color:var(--ac);flex-shrink:0}
.cbody{padding:10px 13px}
.utags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.utag{font-size:7px;padding:2px 5px;border-radius:3px;font-family:'Fira Code',monospace}
.pips{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:10px}
.pip{aspect-ratio:1;border-radius:4px;border:1px solid var(--bd2);background:var(--s3);position:relative;
  transition:transform .12s,box-shadow .12s;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;min-height:36px}
.pip:hover{transform:scale(1.15);z-index:10}
.pip.p-add:hover{box-shadow:0 0 8px rgba(208,126,245,.4)}
.pip.p-done:hover{box-shadow:0 0 8px rgba(94,245,154,.35)}
.pip.p-rep:hover{box-shadow:0 0 8px rgba(249,115,22,.4)}
.pip.p-empty{cursor:default}
.pinner{position:absolute;inset:3px;border-radius:2px}
.ptip{display:none;position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:#000e;color:#fff;font-size:8px;padding:3px 6px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:30;font-family:'Fira Code',monospace}
.pip:hover .ptip{display:block}
.p-done .pinner{opacity:1}.p-add .pinner{opacity:.3;border:1px dashed rgba(255,255,255,.3)}.p-empty{border-color:var(--bd)}
.pcheck{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,1);pointer-events:none;z-index:2}
.pip.unsaved-toggle::after{content:'';position:absolute;top:-3px;right:-3px;width:6px;height:6px;border-radius:50%;background:#ffc233;border:1px solid var(--bg);z-index:5}
.prog-wrap{margin-bottom:7px}
.sbar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:3px}
.sbar-fill{height:100%;background:var(--ac);border-radius:2px}
.sbar-label{font-family:'Fira Code',monospace;font-size:8px;color:var(--dim)}
.breakdown{display:flex;flex-direction:column;gap:4px}
.brow{display:flex;align-items:center;gap:6px}
.bdot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.blabel{color:var(--dim);flex:1;font-size:11px}
.bval{font-family:'Fira Code',monospace;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:var(--s3)}
.bsub{font-family:'Fira Code',monospace;font-size:8px;display:flex;gap:4px;margin-left:2px}
.legend{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:18px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim);font-family:'Fira Code',monospace}
.ldot{width:8px;height:8px;border-radius:2px}
.pip-legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;font-family:'Fira Code',monospace;font-size:9px;color:var(--dim)}
.pl-item{display:flex;align-items:center;gap:5px}
.pl-sw{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.foot{text-align:center;margin-top:24px;font-size:9px;color:var(--bd2);font-family:'Fira Code',monospace;letter-spacing:2px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .15s ease}
.modal-overlay.closing{animation:fadeOut .15s ease forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes fadeOut{from{opacity:1}to{opacity:0}}
.modal{background:var(--s1);border:1.5px solid var(--bd2);border-radius:14px;padding:20px;min-width:270px;max-width:340px;width:88%;animation:popIn .18s ease}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.modal-piece{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:14px;line-height:1.3}
.modal-section-label{font-family:'Fira Code',monospace;font-size:8px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:8px}
.modal-slot-info{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1.5px solid var(--bd2);background:var(--s2);margin-bottom:14px}
.modal-slot-name{font-size:12px;font-weight:600;flex:1}
.modal-slot-idx{font-family:'Fira Code',monospace;font-size:9px;color:var(--dim)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal-btn{font-family:'Fira Code',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:9px 16px;border-radius:7px;border:none;cursor:pointer;transition:all .12s;min-height:40px;-webkit-tap-highlight-color:transparent}
.modal-btn-cancel{background:var(--s3);color:var(--dim);border:1px solid var(--bd)}.modal-btn-cancel:hover{color:var(--txt)}
.modal-btn-confirm{background:rgba(208,126,245,.15);color:var(--flow);border:1px solid rgba(208,126,245,.4)}.modal-btn-confirm:hover{background:rgba(208,126,245,.25)}
.modal-btn-unslot{background:rgba(245,98,98,.1);color:#f56262;border:1px solid rgba(245,98,98,.3)}.modal-btn-unslot:hover{background:rgba(245,98,98,.2)}
.modal-warn{font-family:'Fira Code',monospace;font-size:9px;color:#f97316;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:6px;padding:10px 12px;line-height:1.7;margin-bottom:14px}
/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:12px 20px;padding-bottom:max(12px,calc(10px + env(safe-area-inset-bottom)));
  background:rgba(3,4,10,.94);border-top:1px solid var(--bd2);backdrop-filter:blur(10px);
  transform:translateY(100%);transition:transform .25s ease}
.save-bar.visible{transform:translateY(0)}
.save-bar-msg{font-family:'Fira Code',monospace;font-size:9px;color:var(--dim);letter-spacing:1px}
.save-bar-msg strong{color:var(--flow)}
.save-bar-actions{display:flex;gap:8px;flex-shrink:0}
.save-btn{font-family:'Fira Code',monospace;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:9px 18px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;min-height:40px;-webkit-tap-highlight-color:transparent}
.save-btn-discard{background:var(--s2);color:var(--dim);border:1px solid var(--bd)}.save-btn-discard:hover{color:var(--txt)}
.save-btn-save{background:var(--flow);color:#000;font-weight:700}.save-btn-save:hover{background:#e090ff}
.save-toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(94,245,154,.15);border:1px solid rgba(94,245,154,.4);color:#5ef59a;font-family:'Fira Code',monospace;font-size:10px;padding:8px 16px;border-radius:8px;z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.save-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Mobile */
@media(max-width:600px){
  .home{padding:28px 16px 20px}
  .home-title{font-size:36px}
  .ggrid{grid-template-columns:1fr}
  .mgrid{grid-template-columns:1fr}
  .rem-body{flex-direction:column}
  .rem-gem{min-width:unset}
  .tbox{flex-direction:column;align-items:flex-start}
  .pip{min-height:40px}
  .modal{width:92vw}
  .strip{gap:6px}
  .sc{min-width:72px;padding:10px 12px}
  .sc-n{font-size:20px}
}
</style>
</head>
<body>

<!-- Modal -->
<div class="modal-overlay" id="gemModal" style="display:none">
  <div class="modal">
    <div class="modal-title">Edit Gem Slot</div>
    <div class="modal-piece" id="modalPieceName"></div>
    <div class="modal-section-label" id="modalLabel"></div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

// ─── HELPERS ──────────────────────────────────────────────────
function deepClone(o) {
  if (!o || typeof o !== "object") return o;
  if (Array.isArray(o)) return o.map(deepClone);
  var r = {};
  for (var k in o) if (Object.prototype.hasOwnProperty.call(o,k)) r[k] = deepClone(o[k]);
  return r;
}
function loadSaved(lsKey, def) {
  try { var r = localStorage.getItem(lsKey); if (r) return JSON.parse(r); } catch(e) {}
  return deepClone(def);
}
function persistSave(lsKey, data) {
  try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch(e) {}
}

// ─── OVERALL PROGRESS per primary ─────────────────────────────
function getPrimaryProgress(pk) {
  var pd = PDATA[pk];
  var lsKey = PRIMARIES[pk].ls;
  var sl = loadSaved(lsKey, pd.SLOTTED_DEFAULT);
  var totalNeed = 0, totalHave = 0;
  for (var i = 0; i < pd.PIECES.length; i++) {
    var piece = pd.PIECES[i];
    var s = sl[piece.id] || {};
    for (var g = 0; g < piece.gems.length; g++) {
      var t = piece.gems[g].t, n = piece.gems[g].n;
      totalNeed += n;
      totalHave += Math.min(s[t]||0, n);
    }
  }
  // Deduplicate: pieces appear in multiple metas but only count once
  // Actually count unique piece slots
  return {pct: totalNeed ? Math.round(totalHave/totalNeed*100) : 0, have:totalHave, need:totalNeed};
}

    syncSaveBar();
  }
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});

function openPrimary(pk) {
  currentPrimary = pk;
  var pd = PDATA[pk];
  var pc = PRIMARIES[pk];

  // Load data into globals
  GEM = pd.GEM; GEMKEYS = pd.GEMKEYS; MC = pd.MC;
  PIECES = pd.PIECES; METAS = pd.METAS; REPLACE = pd.REPLACE || {};
  pm = {};
  for (var i = 0; i < PIECES.length; i++) pm[PIECES[i].id] = PIECES[i];

  SLOTTED = loadSaved(pc.ls, pd.SLOTTED_DEFAULT);
  PENDING = deepClone(SLOTTED);
  unsavedCount = 0;

  // Set accent color
  document.documentElement.style.setProperty("--ac", pc.color);

  // Set header content
  document.getElementById("eye-"+pk).textContent = "Ro-Beats \u00b7 Gem Planner";
  document.getElementById("h1-"+pk).innerHTML = "<em>"+pd.title.split(" ")[0]+"</em> "+pd.title.split(" ").slice(1).join(" ");
  document.getElementById("sub-"+pk).textContent = pd.sub;
  document.getElementById("topbar-"+pk).textContent = pd.title;

  // Render static sections
  renderStrip(pk);
  renderMasterList(pk);
  renderKeybox(pk);

  // Set initial active meta
  if (!activeMeta[pk]) activeMeta[pk] = Object.keys(METAS)[0];

  // Show page
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.getElementById("page-"+pk).classList.add("active");
  window.scrollTo(0,0);

  renderTabs(pk);
  renderMeta(pk);
  syncSaveBar();
}

function renderStrip(pk) {
  var pd = PDATA[pk];
  var dupCount = 0, multiCount = 0;
  var pieceSet = {};
  for (var i = 0; i < pd.PIECES.length; i++) {
    var p = pd.PIECES[i];
    pieceSet[p.id] = 1;
    if (p.type === "dup") dupCount++;
    if (p.type === "multi") multiCount++;
  }
  var totalGems = 0;
  var mkeys = Object.keys(pd.METAS);
  for (var i = 0; i < mkeys.length; i++) {
    var t = pd.METAS[mkeys[i]].totals;
    var s = 0; for (var k in t) s += t[k];
    totalGems = s; break; // all metas = 90
  }
  var pc = PRIMARIES[pk];
  var d = [
    [pd.PIECES.length, pc.color, "Pieces"],
    [mkeys.length, "#fff", "Metas"],
    [dupCount||"0", pc.color === "#d07ef5" ? "var(--dup)" : pc.color, "Duplicates"],
    [totalGems, "#5ef59a", "Gems/Meta"]
  ];
  var h = "";
  for (var i = 0; i < d.length; i++)
    h += '<div class="sc"><div class="sc-n" style="color:'+d[i][1]+'">'+d[i][0]+'</div><div class="sc-l">'+d[i][2]+'</div></div>';
  document.getElementById("strip-"+pk).innerHTML = h;
}

function renderMasterList(pk) {
  var pd = PDATA[pk];
  var h = '<div class="mtitle">All Pieces</div><div class="mgrid">';
  for (var i = 0; i < pd.PIECES.length; i++) {
    var p = pd.PIECES[i];
    var bc = p.type==="multi"?"b-multi":p.type==="dup"?"b-dup":"b-solo";
    var nc = p.type==="multi"?"var(--multi)":p.type==="dup"?"var(--dup)":"#6a5a90";
    var lbl = p.type==="multi"?"MULTI":p.type==="dup"?"DUP":"EXCL";
    var num = i<9?"0"+(i+1):""+(i+1);
    h += '<div class="mrow"><div class="mnum" style="color:'+nc+'">'+num+'</div>'
      + '<div class="mname" style="color:'+nc+'">'+p.name+'</div>'
      + '<span class="mbadge badge '+bc+'">'+lbl+'</span></div>';

}

function openModal(pid, gemType, isSlotted, isReplace) {

  var lbl = document.getElementById("modalLabel");
  var body = document.getElementById("modalBody");
  var actions = document.getElementById("modalActions");
  var gc = GEM[gemType] ? GEM[gemType].color : "#888";
  var gl = GEM[gemType] ? GEM[gemType].label : gemType;
  var slotInfo = '<div class="modal-slot-info"><div style="width:12px;height:12px;border-radius:3px;background:'+gc+';flex-shrink:0"></div><span class="modal-slot-name" style="color:'+gc+'">'+gl+'</span></div>';
  if (isReplace) {
    lbl.textContent = "\u26a0 Delete required";
    body.innerHTML = '<div class="modal-warn">This <strong>'+gl+'</strong> must be deleted in-game \u2014 it\u2019s the wrong gem type for this piece\u2019s target build.</div>';
    actions.innerHTML = '<button class="modal-btn modal-btn-cancel" id="mClose">Close</button>';
    document.getElementById("mClose").onclick = closeModal;
  } else if (isSlotted) {
    lbl.textContent = "Currently slotted";
    body.innerHTML = slotInfo;
    actions.innerHTML = '<button class="modal-btn modal-btn-cancel" id="mClose">Cancel</button><button class="modal-btn modal-btn-unslot" id="mUnslot">Mark as Not Slotted</button>';
    document.getElementById("mClose").onclick = closeModal;
    document.getElementById("mUnslot").onclick = function() {
      if (!PENDING[pid]) PENDING[pid] = {};
      if ((PENDING[pid][gemType]||0) > 0) {
        PENDING[pid][gemType]--;
        if (!PENDING[pid][gemType]) delete PENDING[pid][gemType];
        if (!Object.keys(PENDING[pid]).length) delete PENDING[pid];
      }
      unsavedCount++; syncSaveBar(); closeModal(); renderMeta(currentPrimary);
    };
  } else {
    lbl.textContent = "Add to slotted";
    body.innerHTML = slotInfo;
    actions.innerHTML = '<button class="modal-btn modal-btn-cancel" id="mClose">Cancel</button><button class="modal-btn modal-btn-confirm" id="mSlot">Mark Slotted \u2713</button>';
    document.getElementById("mClose").onclick = closeModal;
    document.getElementById("mSlot").onclick = function() {
      if (!PENDING[pid]) PENDING[pid] = {};
      PENDING[pid][gemType] = (PENDING[pid][gemType]||0)+1;
      unsavedCount++; syncSaveBar(); closeModal(); renderMeta(currentPrimary);
    };
  }
  var ov = document.getElementById("gemModal");
  ov.style.display = "flex";
  ov.onclick = function(e){if(e.target===ov)closeModal();};
}

// ─── COMPUTE REMAINING ────────────────────────────────────────
function computeRemaining(metaKey) {
  var m = METAS[metaKey];
  var needed={}, have={};
  for (var i=0;i<m.ids.length;i++) {
    var pid=m.ids[i], piece=pm[pid], sl=PENDING[pid]||{};
    for (var g=0;g<piece.gems.length;g++) {
      var t=piece.gems[g].t, n=piece.gems[g].n;
      needed[t]=(needed[t]||0)+n;
      have[t]=(have[t]||0)+Math.min(sl[t]||0,n);
    }
  }
  var remaining={}, tKeys=Object.keys(needed);
  var totalNeed=0, totalHave=0;
  for (var i=0;i<tKeys.length;i++) {
    var t=tKeys[i], r=needed[t]-(have[t]||0);
    if (r>0) remaining[t]=r;
    totalNeed+=needed[t]; totalHave+=(have[t]||0);
  }
  return {remaining:remaining, have:totalHave, total:totalNeed};
}

// ─── REMAINING PANEL ──────────────────────────────────────────
function remainingPanel(metaKey) {
  var mc=MC[metaKey], res=computeRemaining(metaKey);
  var pct=Math.round(res.have/res.total*100);
  var remTotal=0, rKeys=Object.keys(res.remaining);
  for (var i=0;i<rKeys.length;i++) remTotal+=res.remaining[rKeys[i]];
  var gemCards="";
  for (var g=0;g<GEMKEYS.length;g++) {
    var t=GEMKEYS[g], needed=METAS[metaKey].totals[t]||0;
    if (!needed) continue;
    var left=res.remaining[t]||0, done=left===0;
    gemCards+='<div class="rem-gem'+(done?" rem-done":"")+'">'
      +'<div class="rem-dot" style="background:'+GEM[t].color+'"></div>'
      +'<div style="flex:1"><div class="rem-label">'+GEM[t].label+'</div><div class="rem-gsub">need '+needed+' total</div></div>'
      +'<div style="text-align:right"><div class="rem-count" style="color:'+(done?"#5ef59a":GEM[t].color)+'">'+(done?"&#10003;":left)+'</div><div class="rem-gsub">'+(done?"complete":"still needed")+'</div></div>'
      +'</div>';
  }
  return '<div class="rem-panel" style="border-color:'+mc.bd+'">'
    +'<div class="rem-head" style="background:'+mc.bg+'"><span class="rem-title">Remaining Gems</span><span class="rem-progress" style="color:'+mc.tx+'">'+res.have+' / '+res.total+' ('+pct+'%)</span></div>'
    +'<div class="rem-bar-wrap" style="background:'+mc.bg+'"><div class="rem-bar-bg"><div class="rem-bar-fill" style="width:'+pct+'%;background:'+mc.tx+'"></div></div><div class="rem-sub-text">'+remTotal+' gems still to add</div></div>'
    +'<div class="rem-body">'+gemCards+'</div></div>';
}

// ─── CONFLICT HELPER ──────────────────────────────────────────
function pieceConflict(pid) {
  var sl=PENDING[pid]||{}, piece=pm[pid];
  var tgt={};
  for (var g=0;g<piece.gems.length;g++) tgt[piece.gems[g].t]=piece.gems[g].n;
  var repList=REPLACE[pid]||[], repMap={};
  for (var r=0;r<repList.length;r++) repMap[repList[r].t]=(repMap[repList[r].t]||0)+repList[r].n;
  var extra={};
  for (var t in sl) { if (!tgt[t]&&sl[t]>0&&!repMap[t]) extra[t]=sl[t]; }
  return {tgt:tgt,sl:sl,repMap:repMap,extra:extra};
}

// ─── BUILD PIPS ───────────────────────────────────────────────
function buildPips(piece) {
  var seq=[];
  for (var g=0;g<piece.gems.length;g++)
    for (var x=0;x<piece.gems[g].n;x++) seq.push(piece.gems[g].t);
  while (seq.length<15) seq.push(null);
  var pending=deepClone(PENDING[piece.id]||{});
  var saved=deepClone(SLOTTED[piece.id]||{});
  var repList=REPLACE[piece.id]||[], repMap={};
  for (var r=0;r<repList.length;r++) repMap[repList[r].t]=(repMap[repList[r].t]||0)+repList[r].n;
  var pendingCopy=deepClone(pending), repCopy=deepClone(repMap);
  var h="";
  for (var s=0;s<seq.length;s++) {
    var t=seq[s];
    if (!t){h+='<div class="pip p-empty"></div>';continue;}
    var gc=GEM[t]?GEM[t].color:"#888";
    var gl=GEM[t]?GEM[t].label:t;
    if (repCopy[t]&&repCopy[t]>0) {
      repCopy[t]--;
      h+='<div class="pip p-rep" data-pid="'+piece.id+'" data-gem="'+t+'" data-slotted="0" data-replace="1">'
        +'<div class="pinner" style="background:'+gc+'"></div>'
        +'<div class="pcheck">&#8998;</div>'
        +'<span class="ptip">DELETE '+gl+'</span></div>';
    } else {
      var isSlotted=(pendingCopy[t]&&pendingCopy[t]>0);
      if (isSlotted) pendingCopy[t]--;
      var unsaved=((pending[t]||0)!==(saved[t]||0))?" unsaved-toggle":"";
      if (isSlotted) {
        h+='<div class="pip p-done'+unsaved+'" data-pid="'+piece.id+'" data-gem="'+t+'" data-slotted="1" data-replace="0">'
          +'<div class="pinner" style="background:'+gc+'"></div>'
          +'<div class="pcheck">&#10003;</div>'
          +'<span class="ptip">'+gl+' \u2014 slotted (tap to undo)</span></div>';
      } else {
        h+='<div class="pip p-add" data-pid="'+piece.id+'" data-gem="'+t+'" data-slotted="0" data-replace="0">'
          +'<div class="pinner" style="background:'+gc+'"></div>'
          +'<span class="ptip">'+gl+' \u2014 tap to mark slotted</span></div>';
      }
    }
  }
  return h;
}

// ─── PROGRESS BAR ─────────────────────────────────────────────
function progressBar(pid, total) {
  var s=PENDING[pid], piece=pm[pid];
  var cf=pieceConflict(pid), done=0;
  if (s) {
    for (var g=0;g<piece.gems.length;g++) {
      var t=piece.gems[g].t, n=piece.gems[g].n;
      var del=cf.repMap[t]||0;
      done+=Math.min(Math.max((s[t]||0)-del,0),n);
    }
  }
  var pct=Math.round(done/total*100);
  var repList=REPLACE[pid]||[], warn="";
  if (repList.length) {
    var parts=[];
    for (var r=0;r<repList.length;r++) parts.push(repList[r].t+"\u00d7"+repList[r].n+" ("+repList[r].reason+")");
    warn='<div class="rep-warn"><strong>&#9888; DELETE FIRST:</strong> '+parts.join(" &nbsp;|&nbsp; ")+"</div>";
  }
  if (!s) return warn;
  return warn+'<div class="prog-wrap"><div class="sbar"><div class="sbar-fill" style="width:'+pct+'%"></div></div><div class="sbar-label">'+done+"/"+total+" correctly slotted</div></div>";
}

// ─── BREAKDOWN ROWS ───────────────────────────────────────────
function breakdownRows(piece) {
  var cf=pieceConflict(piece.id);
  var sl=cf.sl, repMap=cf.repMap, extra=cf.extra;
  var h="";
  for (var g=0;g<piece.gems.length;g++) {
    var t=piece.gems[g].t, n=piece.gems[g].n;
    var del=repMap[t]||0;
    var validSl=Math.min(Math.max((sl[t]||0)-del,0),n);
    var toAdd=n-validSl;
    var gc=GEM[t]?GEM[t].color:"#888";
    var sub="";
    if (validSl>0) sub+='<span style="color:var(--flow)">&#10003;'+validSl+"</span>";
    if (toAdd>0)   sub+='<span style="color:#888">+'+toAdd+"</span>";
    if (del>0)     sub+='<span class="bsub-rep">&#8998;del '+del+"</span>";
    h+='<div class="brow"><div class="bdot" style="background:'+gc+'"></div>'
      +'<span class="blabel">'+(GEM[t]?GEM[t].label:t)+'</span>'
      +'<span class="bval" style="color:'+gc+'">&times;'+n+"</span>"
      +'<span class="bsub">'+sub+"</span></div>";
  }
  for (var t in extra) {
    var gc=GEM[t]?GEM[t].color:"#888";
    h+='<div class="brow" style="background:rgba(249,115,22,.05);border-radius:4px;padding:2px 4px;margin-top:2px">'
      +'<div class="bdot" style="background:'+gc+';opacity:.5"></div>'
      +'<span class="blabel" style="color:#f97316">'+(GEM[t]?GEM[t].label:t)+' (wrong type)</span>'
      +'<span class="bval" style="color:#f97316">&times;'+extra[t]+"</span>"
      +'<span class="bsub"><span class="bsub-rep">&#8998; remove</span></span></div>';
  }
  return h;
}

// ─── UTAGS / CARD ─────────────────────────────────────────────
function utags(usedIn) {
  var h="";
  for (var i=0;i<usedIn.length;i++) {
    var c=MC[usedIn[i]];
    if (!c) continue;
    h+='<span class="utag" style="background:'+c.bg+';border:1px solid '+c.bd+';color:'+c.tx+'">'+c.label+"</span>";
  }
  return h;
}

function card(piece, idx) {
  var tc=piece.type==="multi"?"b-multi":piece.type==="dup"?"b-dup":"b-solo";
  var nc=piece.type==="multi"?"var(--multi)":piece.type==="dup"?"var(--dup)":"#6a5a90";
  var tl=piece.type==="multi"?"&#9679; Multi-meta":piece.type==="dup"?"&#9670; Duplicate":"&#9679; Exclusive";
  var total=0;
  for (var g=0;g<piece.gems.length;g++) total+=piece.gems[g].n;
  return '<div class="card t-'+piece.type+'" style="animation-delay:'+(idx*0.04)+'s">'
    +'<div class="ctop"><div>'
    +  '<div class="cname" style="color:'+nc+'">'+piece.name+'</div>'
    +  '<div style="margin-top:3px"><span class="badge '+tc+'">'+tl+'</span></div>'
    +  '<div class="utags" style="margin-top:4px">'+utags(piece.usedIn)+'</div>'
    +'</div><div class="cslot">'+total+'/15</div></div>'
    +'<div class="cbody">'
    +  progressBar(piece.id, total)
    +  '<div class="pips">'+buildPips(piece)+'</div>'
    +  '<div class="breakdown">'+breakdownRows(piece)+'</div>'
    +'</div></div>';
}

// ─── TABS + META RENDER ───────────────────────────────────────
function renderTabs(pk) {
  var keys=Object.keys(METAS), h="";
  var act=activeMeta[pk];
  for (var i=0;i<keys.length;i++) {
    var k=keys[i];
    h+='<button class="tab '+(k===act?"on":"")+ '" data-m="'+k+'" data-c="'+METAS[k].col+'" data-pk="'+pk+'">'+METAS[k].label+'</button>';
  }
  document.getElementById("tabs-"+pk).innerHTML=h;
  var btns=document.querySelectorAll("#tabs-"+pk+" .tab");
  for (var b=0;b<btns.length;b++) {
    btns[b].addEventListener("click",function(){
      activeMeta[this.getAttribute("data-pk")]=this.getAttribute("data-m");
      renderTabs(this.getAttribute("data-pk"));
      renderMeta(this.getAttribute("data-pk"));
    });
  }
}

function renderMeta(pk) {
  var act=activeMeta[pk];
  var m=METAS[act], mc=MC[act];
  var pieces=[];
  for (var i=0;i<m.ids.length;i++) pieces.push(pm[m.ids[i]]);
  var tKeys=Object.keys(m.totals), chips="";
  for (var i=0;i<tKeys.length;i++) {
    var t=tKeys[i];
    chips+='<div class="chip"><div class="cdot" style="background:'+GEM[t].color+'"></div><span style="color:'+GEM[t].color+';font-weight:700">'+(GEM[t]?GEM[t].short:t)+'</span><span style="color:var(--txt)">&times;'+m.totals[t]+'</span></div>';
  }
  var lgKeys=[];
  for (var g=0;g<GEMKEYS.length;g++) {
    var gk=GEMKEYS[g];
    var mkeys=Object.keys(METAS);
    for (var mk=0;mk<mkeys.length;mk++){if(METAS[mkeys[mk]].totals[gk]){lgKeys.push(gk);break;}}
  }
  var legend="";
  for (var i=0;i<lgKeys.length;i++) {
    var k=lgKeys[i];
    legend+='<div class="li"><div class="ldot" style="background:'+GEM[k].color+'"></div><span>'+(GEM[k]?GEM[k].short:k)+' = '+(GEM[k]?GEM[k].label:k)+'</span></div>';
  }
  var total=0; for (var i=0;i<tKeys.length;i++) total+=m.totals[tKeys[i]];
  var dupCount=0; for (var i=0;i<pieces.length;i++) if(pieces[i].type==="dup") dupCount++;
  var anyPending=false; for (var i=0;i<pieces.length;i++) if(PENDING[pieces[i].id]){anyPending=true;break;}
  var pipLegend="";
  if (anyPending) {
    pipLegend='<div class="pip-legend">'
      +'<div class="pl-item"><div class="pl-sw" style="background:var(--flow);color:#fff">&#10003;</div><span>slotted</span></div>'
      +'<div class="pl-item"><div class="pl-sw" style="background:rgba(208,126,245,.18);border:1px dashed rgba(255,255,255,.2)"></div><span>to add</span></div>'
      +'<div class="pl-item"><div class="pl-sw" style="background:rgba(255,194,51,.2);border:1px solid rgba(255,194,51,.5);font-size:6px;color:#ffc233">&#9679;</div><span>unsaved</span></div>'
      +'</div>';
  }
  var cards=""; for(var i=0;i<pieces.length;i++) cards+=card(pieces[i],i);
  var res=computeRemaining(act);
  document.getElementById("topbar-right-"+pk).textContent=Math.round(res.have/res.total*100)+"%";
  document.getElementById("root-"+pk).innerHTML=
    '<div class="tbox"><span class="tlabel" style="color:'+mc.tx+'">'+m.label+' META</span><div class="chips">'+chips+'</div><span class="stag">= '+total+' gems</span></div>'
    +'<div class="legend">'+legend+'</div>'
    +remainingPanel(act)
    +'<div class="shead"><span class="stitle">Gear Loadout</span><div class="sline"></div><span class="stag">'+(dupCount?dupCount+" dup":"no dups")+'</span></div>'
    +pipLegend
    +'<div class="ggrid">'+cards+'</div>';
  document.getElementById("foot-"+pk).textContent="\u00b7 "+pk+" primary \u00b7 "+m.label.toLowerCase()+" \u00b7 "+total+" gems \u00b7";
}

    navigator.serviceWorker.register("./sw.js").catch(function(){});

window.addEventListener("beforeinstallprompt",function(e){

renderHome();

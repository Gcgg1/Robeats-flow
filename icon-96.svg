<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1019"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0a0ff"/>
      <stop offset="50%" stop-color="#d07ef5"/>
      <stop offset="100%" stop-color="#9040c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="96" height="96" rx="17" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <polygon points="48,12 84,48 48,84 12,48"
    fill="none" stroke="#d07ef5" stroke-width="2" opacity="0.3"/>
  <!-- Gem diamond -->
  <polygon points="48,12 84,48 48,84 12,48"
    fill="url(#gem)" filter="url(#glow)" opacity="0.95"/>
  <!-- Inner highlight -->
  <polygon points="48,29 64,48 48,58 32,48"
    fill="rgba(255,255,255,0.18)"/>
  <!-- Text: RB -->
  <text x="48" y="55" 
    font-family="'Chakra Petch', 'Arial Black', sans-serif"
    font-weight="700" font-size="21"
    fill="white" text-anchor="middle"
    style="letter-spacing: -0px">RB</text>
  <!-- Subtext: FLOW -->
  <text x="48" y="70" 
    font-family="monospace"
    font-weight="400" font-size="12"
    fill="rgba(208,126,245,0.8)" text-anchor="middle"
    style="letter-spacing: 1px">FLOW</text>
</svg>
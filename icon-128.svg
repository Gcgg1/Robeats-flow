<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1019"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0a0ff"/>
      <stop offset="50%" stop-color="#d07ef5"/>
      <stop offset="100%" stop-color="#9040c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="23" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <polygon points="64,16 112,64 64,112 16,64"
    fill="none" stroke="#d07ef5" stroke-width="3" opacity="0.3"/>
  <!-- Gem diamond -->
  <polygon points="64,16 112,64 64,112 16,64"
    fill="url(#gem)" filter="url(#glow)" opacity="0.95"/>
  <!-- Inner highlight -->
  <polygon points="64,38 85,64 64,78 43,64"
    fill="rgba(255,255,255,0.18)"/>
  <!-- Text: RB -->
  <text x="64" y="73" 
    font-family="'Chakra Petch', 'Arial Black', sans-serif"
    font-weight="700" font-size="28"
    fill="white" text-anchor="middle"
    style="letter-spacing: -0px">RB</text>
  <!-- Subtext: FLOW -->
  <text x="64" y="93" 
    font-family="monospace"
    font-weight="400" font-size="16"
    fill="rgba(208,126,245,0.8)" text-anchor="middle"
    style="letter-spacing: 1px">FLOW</text>
</svg>